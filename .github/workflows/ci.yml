name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go vet ./...

      - name: Build
        run: go build -v -o gguf-manager .

      - name: Verify binary exists and runs
        run: ./gguf-manager --help || true
